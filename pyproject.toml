[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "flash"
version = "2.1.0"
description = "Lightweight local-first AI router with Flash and DeepSeek."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "requests>=2.31.0",
]

[tool.setuptools]
packages = ["flash"]
